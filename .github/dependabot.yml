version: 2
updates:
  # Keep the GitHub Actions (incl. the pinned SHAs above) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # npm dependencies at the repo root (workspaces are covered from the root).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
