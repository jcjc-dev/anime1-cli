name: Publish

# Publishes both packages to npm when you publish a GitHub Release.
# You can also run it by hand from the Actions tab (workflow_dispatch).
#
# Authentication uses npm Trusted Publishing (OIDC), so there is no token to
# store. Before the first CI publish, configure a trusted publisher for each
# package on npmjs.com (see the repo README / AGENTS notes for the exact values).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) and provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Use an npm that supports trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - run: npm test

      - name: Publish anime1-core
        run: npm publish -w anime1-core --provenance --access public

      - name: Publish anime1-cli
        run: npm publish -w anime1-cli --provenance --access public
