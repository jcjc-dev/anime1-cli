name: PR gate

# Validation that runs on every pull request and on pushes to main:
# lint, build, and unit tests across a small OS and Node matrix. The release
# pipeline runs the same checks again before publishing.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci --no-audit --no-fund --prefer-offline
      - run: npm run lint
      - run: npm run build
      - run: npm test

  gate:
    # Single, stable status check to require in branch protection. It passes
    # only if every matrix leg of `validate` passed, so the required check does
    # not need to change when the matrix changes.
    name: PR gate passed
    needs: validate
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require all validation jobs to succeed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "One or more validation jobs failed."
            exit 1
          fi
          echo "All validation jobs passed."
